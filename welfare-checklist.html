<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welfare Unit Inspection Checklist – SGN / Cappagh</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F4F6F9;color:#1A2535;min-height:100vh;}
.header{background:linear-gradient(135deg,#FF8C42,#FF6B35);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.header img{height:40px;width:auto;}
.header-title{text-align:center;flex:1;padding:0 12px;}
.header-title h1{color:#fff;font-weight:900;font-size:15px;letter-spacing:.5px;}
.header-title p{color:rgba(255,255,255,.85);font-weight:600;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;}
.progress-bar-wrap{background:#2C3E57;padding:8px 20px;display:flex;align-items:center;gap:12px;}
.progress-label{color:rgba(255,255,255,.65);font-size:12px;font-weight:600;min-width:140px;}
.progress-track{flex:1;height:6px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:#FF8C42;border-radius:4px;transition:width .4s;}
.progress-pct{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;min-width:38px;text-align:right;}
.no-badge{background:#EF4444;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700;}
.container{max-width:780px;margin:0 auto;padding:20px 16px 40px;}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.10);margin-bottom:16px;}
.card-header{background:linear-gradient(90deg,#4A5F7F,#3A4F6F);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.card-header span{color:#fff;font-weight:700;font-size:14px;}
.card-header .count{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;}
.section-progress{height:3px;background:#D0D8E4;}
.section-progress-fill{height:100%;background:#FF8C42;transition:width .3s;}
.details-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.details-grid .full{grid-column:1/-1;}
label.field-label{display:block;font-size:12px;font-weight:700;color:#6B7A8D;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
input[type=text],input[type=date],textarea{width:100%;padding:9px 12px;border:1px solid #D0D8E4;border-radius:7px;font-size:14px;color:#1A2535;background:#fff;font-family:inherit;outline:none;}
input[type=text]:focus,input[type=date]:focus,textarea:focus{border-color:#4A5F7F;}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid #D0D8E4;}
.check-row.yes{background:#F0FDF4;}
.check-row.no{background:#FFF5F5;}
.check-row.na{background:#F8FAFC;}
.row-id{min-width:36px;color:#6B7A8D;font-size:12px;font-weight:700;padding-top:3px;font-family:monospace;flex-shrink:0;}
.row-body{flex:1;min-width:0;}
.row-text{font-size:14px;line-height:1.5;}
.row-comment{margin-top:6px;width:100%;padding:6px 10px;border:1px solid #EF4444;border-radius:6px;font-size:13px;font-family:inherit;display:block;}
.row-btns{display:flex;gap:4px;flex-shrink:0;padding-top:2px;}
.pill{padding:4px 12px;border-radius:20px;border:2px solid #D0D8E4;background:#fff;color:#6B7A8D;font-weight:500;font-size:13px;cursor:pointer;transition:all .15s;min-width:40px;}
.pill.yes-active{border-color:#22C55E;background:#DCFCE7;color:#22C55E;font-weight:700;}
.pill.no-active{border-color:#EF4444;background:#FEE2E2;color:#EF4444;font-weight:700;}
.pill.na-active{border-color:#94A3B8;background:#F1F5F9;color:#94A3B8;font-weight:700;}
.photo-area{margin-top:8px;}
.photo-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.photo-thumb{position:relative;width:80px;}
.photo-thumb img{width:80px;height:60px;object-fit:cover;border-radius:6px;border:2px solid #C4B5FD;display:block;}
.remove-btn{position:absolute;top:-5px;right:-5px;background:#EF4444;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;color:#fff;font-size:11px;line-height:18px;text-align:center;padding:0;}
.photo-thumb input{margin-top:3px;width:100%;padding:3px 5px;font-size:10px;border:1px solid #D0D8E4;border-radius:4px;}
.photo-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:1px dashed #C4B5FD;background:#F8F4FF;color:#7C3AED;font-size:12px;font-weight:600;cursor:pointer;}
.section-photos{border-top:2px dashed #C4B5FD;background:#F8F4FF;padding:14px 16px;}
.section-photos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-photos-title{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px;color:#7C3AED;}
.section-photos-add{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:1.5px solid #C4B5FD;background:#fff;color:#7C3AED;font-size:12px;font-weight:700;cursor:pointer;}
.section-photo-grid{display:flex;flex-wrap:wrap;gap:12px;}
.section-photo-item{position:relative;width:110px;}
.section-photo-item img{width:110px;height:82px;object-fit:cover;border-radius:8px;border:2px solid #C4B5FD;display:block;}
.section-photo-num{position:absolute;top:4px;left:4px;background:rgba(124,58,237,.75);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;}
.section-photo-item .remove-btn{width:20px;height:20px;font-size:12px;line-height:20px;top:-6px;right:-6px;}
.section-photo-item input{margin-top:4px;width:100%;padding:4px 6px;font-size:11px;border:1px solid #C4B5FD;border-radius:5px;}
.section-photos-empty{font-size:12px;color:#6B7A8D;font-style:italic;}
.defects-table{width:100%;border-collapse:collapse;font-size:13px;}
.defects-table th{padding:8px 10px;text-align:left;font-weight:700;color:#6B7A8D;font-size:11px;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid #D0D8E4;white-space:nowrap;background:#F4F6F9;}
.defects-table td{padding:6px 8px;border-bottom:1px solid #D0D8E4;}
.defects-table td input{width:100%;padding:6px 8px;border:1px solid #D0D8E4;border-radius:6px;font-size:13px;font-family:inherit;}
.add-row-btn{margin-top:10px;padding:6px 14px;background:none;border:1px dashed #D0D8E4;border-radius:6px;color:#6B7A8D;font-size:13px;cursor:pointer;}
.outcome-card .card-header{background:linear-gradient(90deg,#FF8C42,#FF6B35);}
.outcome-btn{padding:12px 18px;border-radius:8px;border:2px solid #D0D8E4;background:#fff;color:#6B7A8D;font-weight:500;font-size:14px;cursor:pointer;text-align:left;transition:all .15s;width:100%;margin-bottom:8px;display:block;}
.outcome-btn.sat-active{border-color:#22C55E;background:#DCFCE7;color:#15803D;font-weight:700;}
.outcome-btn.minor-active{border-color:#D97706;background:#FEF9C3;color:#B45309;font-weight:700;}
.outcome-btn.unsat-active{border-color:#EF4444;background:#FEE2E2;color:#DC2626;font-weight:700;}
.outcome-wrap{padding:16px;}
.sig-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.submit-row{display:flex;gap:12px;justify-content:flex-end;margin-top:4px;}
.reset-btn{padding:12px 24px;border:1px solid #D0D8E4;border-radius:8px;background:#fff;color:#6B7A8D;font-weight:600;font-size:14px;cursor:pointer;}
.submit-btn{padding:12px 32px;background:linear-gradient(135deg,#FF8C42,#FF6B35);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 2px 8px rgba(255,107,53,.35);}
.submit-btn:disabled{background:#CBD5E1;box-shadow:none;cursor:not-allowed;}
.success-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#F4F6F9;}
.success-card{background:#fff;border-radius:16px;padding:40px;max-width:420px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.10);width:100%;}
.success-card h2{margin:0 0 8px;color:#4A5F7F;font-size:22px;}
.success-card p{color:#6B7A8D;margin:0 0 6px;font-size:14px;}
.outcome-pill{padding:10px 18px;border-radius:8px;font-weight:700;font-size:14px;display:inline-block;margin:16px 0 24px;}
.new-btn{padding:10px 28px;background:linear-gradient(135deg,#FF8C42,#FF6B35);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;}
@media(max-width:600px){
  .details-grid,.sig-grid{grid-template-columns:1fr;}
  .details-grid .full{grid-column:1;}
  .pill{padding:4px 8px;font-size:12px;min-width:34px;}
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinner{display:inline-block;animation:spin 1s linear infinite;}
</style>
</head>

  <span class="progress-label" id="prog-label">0 / 34 items checked</span>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="prog-pct">0%</span>
  <span class="no-badge" id="prog-no" style="display:none"></span>
  <span id="prog-photos" style="display:none;background:rgba(124,58,237,.4);color:#E9D5FF;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700"></span>
</div>

<div class="container" id="main-container"></div>

<!-- SUCCESS SCREEN (hidden until submit) -->
<div class="success-screen" id="success-screen" style="display:none">
  <div class="success-card">
    <div style="font-size:56px;margin-bottom:16px">✅</div>
    <h2>Inspection Submitted</h2>
    <p id="s-project"></p>
    <p id="s-inspector"></p>
    <p id="s-date"></p>
    <p id="s-photos" style="color:#7C3AED;font-weight:700;font-size:13px;margin-top:6px"></p>
    <div class="outcome-pill" id="s-outcome"></div><br/>
    <button class="new-btn" onclick="handleReset()">Start New Inspection</button>
  </div>
</div>

<script>
const POWER_AUTOMATE_URL = "https://default2f786ffc30664db0bc9c7048818134.4a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/58ae27f9d2504b4e95e4eb56033ecc27/triggers/manual/paths/invoke?api-version=1";

const SECTIONS = [
  {id:"1",title:"1. General Condition",items:[
    {id:"1.1",text:"Welfare unit in good overall condition"},
    {id:"1.2",text:"Unit positioned safely and level"},
    {id:"1.3",text:"Safe access and egress provided"},
    {id:"1.4",text:"Steps, handrails and platforms secure and in good condition"},
    {id:"1.5",text:"No slip, trip or fall hazards around unit"},
  ]},
  {id:"1A",title:"1A. Welfare Unit Security and Segregation",items:[
    {id:"1A.1",text:"Welfare unit adequately segregated from the work area and traffic routes"},
    {id:"1A.2",text:"Fence panels installed around welfare unit where required"},
    {id:"1A.3",text:"Fence panels secure, stable and free from damage"},
    {id:"1A.4",text:"Fence panels double clipped at all connections"},
    {id:"1A.5",text:"Pedestrian access to welfare unit clearly identified and unobstructed"},
    {id:"1A.6",text:"Segregation maintained for plant storage and excavated spoil / muck pile"},
    {id:"1A.7",text:"Appropriate warning and directional signage displayed"},
  ]},
  {id:"2",title:"2. Welfare Facilities",items:[
    {id:"2.1",text:"Toilet clean and fully operational"},
    {id:"2.2",text:"Toilet paper available"},
    {id:"2.3",text:"Running water available"},
    {id:"2.4",text:"Hot water available (where applicable)"},
    {id:"2.5",text:"Soap available"},
    {id:"2.6",text:"Hand drying facilities available"},
    {id:"2.7",text:"Drinking water available and clearly identified"},
    {id:"2.8",text:"Seating adequate and clean"},
  ]},
  {id:"3",title:"3. Housekeeping",items:[
    {id:"3.1",text:"Welfare unit clean and tidy"},
    {id:"3.2",text:"Waste bins provided and not overflowing"},
    {id:"3.3",text:"Food preparation area clean"},
    {id:"3.4",text:"No accumulation of waste or combustible materials"},
  ]},
  {id:"4",title:"4. Fire Safety",items:[
    {id:"4.1",text:"Fire extinguisher present and in date"},
    {id:"4.2",text:"Fire blanket provided (where applicable)"},
    {id:"4.3",text:"Fire exits unobstructed"},
    {id:"4.4",text:"Emergency contact details displayed"},
  ]},
  {id:"5",title:"5. Gas, Carbon Monoxide & Smoke Safety",items:[
    {id:"5.1",text:"CO alarm fitted and operational"},
    {id:"5.2",text:"Smoke alarm fitted and operational"},
    {id:"5.3",text:"No signs of fuel or gas leaks"},
    {id:"5.4",text:"Heater functioning correctly and safely"},
  ]},
  {id:"6",title:"6. Electrical Safety",items:[
    {id:"6.1",text:"Electrical installation in good condition"},
    {id:"6.2",text:"No damaged cables or sockets"},
    {id:"6.3",text:"Portable electrical equipment appears serviceable"},
  ]},
  {id:"7",title:"7. Information & Documentation",items:[
    {id:"8.1",text:"HSE Law Poster displayed"},
    {id:"8.2",text:"First Aid information displayed"},
    {id:"8.3",text:"Emergency arrangements displayed"},
    {id:"8.4",text:"Site rules and welfare information displayed"},
    {id:"8.5",text:"Site Coordinator details displayed outside the Welfare unit"},
  ]},
];

// ── State (plain object, mutated directly — no re-render on text input) ────────
const S = {
  details: {project:"",siteLocation:"",date:new Date().toISOString().split("T")[0],inspector:"",unitId:""},
  answers:{}, comments:{},
  defects:[
    {ref:"1",defect:"",action:"",responsible:"",targetDate:""},
    {ref:"2",defect:"",action:"",responsible:"",targetDate:""},
    {ref:"3",defect:"",action:"",responsible:"",targetDate:""},
  ],
  outcome:null,
  inspectorSig:"",inspectorSigDate:"",
  supervisorSig:"",supervisorSigDate:"",
  itemPhotos:{}, sectionPhotos:{},
};

// ── Derived ────────────────────────────────────────────────────────────────────
const allItems = () => SECTIONS.flatMap(s=>s.items);
const totalItems = () => allItems().length;
const answeredCount = () => allItems().filter(i=>S.answers[i.id]).length;
const noCount = () => allItems().filter(i=>S.answers[i.id]==='no').length;
const overallPct = () => Math.round(answeredCount()/totalItems()*100);
const totalPhotos = () =>
  Object.values(S.itemPhotos).reduce((n,a)=>n+a.length,0) +
  Object.values(S.sectionPhotos).reduce((n,a)=>n+a.length,0);

// ── Progress bar (lightweight, no full re-render) ──────────────────────────────
function updateProgress() {
  const p = overallPct(), ac = answeredCount(), nc = noCount(), tp = totalPhotos();
  document.getElementById('prog-label').textContent = ac+' / '+totalItems()+' items checked';
  const fill = document.getElementById('prog-fill');
  fill.style.width = p+'%';
  fill.style.background = p===100?'#22C55E':'#FF8C42';
  const pctEl = document.getElementById('prog-pct');
  pctEl.textContent = p+'%';
  pctEl.style.color = p===100?'#86EFAC':'rgba(255,255,255,.65)';
  const noEl = document.getElementById('prog-no');
  if(nc>0){noEl.style.display='';noEl.textContent=nc+' ✗';}else{noEl.style.display='none';}
  const phEl = document.getElementById('prog-photos');
  if(tp>0){phEl.style.display='';phEl.textContent='📷 '+tp;}else{phEl.style.display='none';}
}

// ── Section progress (update just that bar) ────────────────────────────────────
function updateSectionProgress(sectionId) {
  const section = SECTIONS.find(s=>s.id===sectionId);
  if(!section) return;
  const done = section.items.filter(i=>S.answers[i.id]).length;
  const p = Math.round(done/section.items.length*100);
  const fillEl = document.getElementById('spfill-'+sectionId);
  if(fillEl){fillEl.style.width=p+'%';fillEl.style.background=p===100?'#22C55E':'#FF8C42';}
  const countEl = document.getElementById('scount-'+sectionId);
  if(countEl) countEl.textContent=done+'/'+section.items.length;
}

// ── Initial full render (once only) ───────────────────────────────────────────
function fullRender() {
  const container = document.getElementById('main-container');
  container.innerHTML = buildSiteDetails() + SECTIONS.map(buildSection).join('') +
    buildDefects() + buildOutcome() + buildSignatures() +
    `<div class="submit-row">
      <button class="reset-btn" onclick="handleReset()">Reset Form</button>
      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Submit Inspection</button>
    </div>`;
  bindLiveInputs();
  updateProgress();
}

function buildSiteDetails() {
  return `<div class="card">
    <div class="card-header"><span>Site Details</span></div>
    <div class="details-grid">
      <div class="full"><label class="field-label">Project</label>
        <input type="text" id="d-project" placeholder="Project name or number"/></div>
      <div><label class="field-label">Site Location</label>
        <input type="text" id="d-siteLocation" placeholder="e.g. First Avenue, Walton"/></div>
      <div><label class="field-label">Date</label>
        <input type="date" id="d-date" value="${S.details.date}"/></div>
      <div><label class="field-label">Inspector</label>
        <input type="text" id="d-inspector" placeholder="Full name"/></div>
      <div><label class="field-label">Welfare Unit ID / Registration</label>
        <input type="text" id="d-unitId" placeholder="e.g. WU-001"/></div>
    </div></div>`;
}

function buildSection(section) {
  const rows = section.items.map(item => `
    <div class="check-row" id="row-${item.id}">
      <span class="row-id">${item.id}</span>
      <div class="row-body">
        <div class="row-text">${item.text}</div>
        <div id="extras-${item.id}"></div>
      </div>
      <div class="row-btns">
        <button class="pill" id="pill-yes-${item.id}" onclick="setAnswer('${item.id}','yes')">Y</button>
        <button class="pill" id="pill-no-${item.id}" onclick="setAnswer('${item.id}','no')">N</button>
        <button class="pill" id="pill-na-${item.id}" onclick="setAnswer('${item.id}','na')">N/A</button>
      </div>
    </div>`).join('');

  return `<div class="card">
    <div class="card-header">
      <span>${section.title}</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="sphoto-badge-${section.id}" style="display:none;background:rgba(124,58,237,.35);color:#E9D5FF;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700"></span>
        <span class="count" id="scount-${section.id}">${section.items.filter(i=>S.answers[i.id]).length}/${section.items.length}</span>
      </div>
    </div>
    <div class="section-progress"><div class="section-progress-fill" id="spfill-${section.id}" style="width:0%"></div></div>
    ${rows}
    <div class="section-photos" id="sphotos-${section.id}">
      ${buildSectionPhotosInner(section.id, section.title)}
    </div>
  </div>`;
}

function buildSectionPhotosInner(sectionId, sectionTitle) {
  const photos = S.sectionPhotos[sectionId]||[];
  const badge = photos.length>0?`<span style="background:#7C3AED;color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:1px 7px;margin-left:2px">${photos.length}</span>`:'';
  const grid = photos.length===0
    ? '<p class="section-photos-empty">No section photos added yet.</p>'
    : `<div class="section-photo-grid">${photos.map((ph,idx)=>`
        <div class="section-photo-item">
          <img src="${ph.dataUrl}" alt="evidence"/>
          <span class="section-photo-num">${idx+1}</span>
          <button class="remove-btn" onclick="removeSectionPhoto('${sectionId}','${ph.id}')">×</button>
          <input type="text" value="${esc(ph.caption)}" onchange="captionSectionPhoto('${sectionId}','${ph.id}',this.value)" placeholder="Caption…"/>
        </div>`).join('')}</div>`;
  return `<div class="section-photos-header">
      <span class="section-photos-title">📷 Photo Evidence — ${sectionTitle} ${badge}</span>
      <label class="section-photos-add">📷 Add Photo
        <input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="addSectionPhotos('${sectionId}',this.files)"/>
      </label>
    </div>${grid}`;
}

function buildDefects() {
  const rows = S.defects.map((d,i)=>`<tr>
    <td style="font-weight:700;color:#6B7A8D;width:36px">${d.ref}</td>
    <td><input type="text" value="${esc(d.defect)}" onchange="S.defects[${i}].defect=this.value" placeholder="Describe defect…"/></td>
    <td><input type="text" value="${esc(d.action)}" onchange="S.defects[${i}].action=this.value" placeholder="Action needed…"/></td>
    <td><input type="text" value="${esc(d.responsible)}" onchange="S.defects[${i}].responsible=this.value" placeholder="Name…"/></td>
    <td><input type="date" value="${d.targetDate||''}" onchange="S.defects[${i}].targetDate=this.value"/></td>
  </tr>`).join('');
  return `<div class="card">
    <div class="card-header"><span>Defects / Corrective Actions</span></div>
    <div style="padding:16px;overflow-x:auto">
      <table class="defects-table" id="defects-table">
        <thead><tr><th>Ref</th><th>Defect Identified</th><th>Action Required</th><th>Responsible Person</th><th>Target Date</th></tr></thead>
        <tbody id="defects-tbody">${rows}</tbody>
      </table>
      <button class="add-row-btn" onclick="addDefectRow()">+ Add row</button>
    </div></div>`;
}

function buildOutcome() {
  return `<div class="card outcome-card">
    <div class="card-header"><span>Inspection Outcome</span></div>
    <div class="outcome-wrap">
      <button class="outcome-btn" id="out-satisfactory" onclick="setOutcome('satisfactory')">○ Satisfactory – No Action Required</button>
      <button class="outcome-btn" id="out-minor" onclick="setOutcome('minor')">○ Satisfactory – Minor Actions Required</button>
      <button class="outcome-btn" id="out-unsatisfactory" onclick="setOutcome('unsatisfactory')">○ Unsatisfactory – Immediate Action Required</button>
    </div></div>`;
}

function buildSignatures() {
  return `<div class="card">
    <div class="card-header"><span>Signatures</span></div>
    <div class="sig-grid">
      <div><label class="field-label">Inspector Signature</label>
        <input type="text" id="sig-inspector" placeholder="Type full name as signature"/></div>
      <div><label class="field-label">Date</label>
        <input type="date" id="sig-inspector-date"/></div>
      <div><label class="field-label">Supervisor Signature</label>
        <input type="text" id="sig-supervisor" placeholder="Type full name as signature"/></div>
      <div><label class="field-label">Date</label>
        <input type="date" id="sig-supervisor-date"/></div>
    </div></div>`;
}

// ── Bind live text inputs (use 'input' event, mutate state, no re-render) ──────
function bindLiveInputs() {
  const bind = (id, path) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.value = path.reduce((o,k)=>o[k], S) || '';
    el.addEventListener('input', ()=>{ path.reduce((o,k,i)=>i===path.length-1?(o[k]=el.value,o):o[k],S); });
  };
  bind('d-project',['details','project']);
  bind('d-siteLocation',['details','siteLocation']);
  bind('d-date',['details','date']);
  bind('d-inspector',['details','inspector']);
  bind('d-unitId',['details','unitId']);
  bind('sig-inspector',['inspectorSig']);
  bind('sig-inspector-date',['inspectorSigDate']);
  bind('sig-supervisor',['supervisorSig']);
  bind('sig-supervisor-date',['supervisorSigDate']);
}

// ── Answer pills ───────────────────────────────────────────────────────────────
function setAnswer(id, val) {
  if(S.answers[id]===val) delete S.answers[id]; else S.answers[id]=val;
  // Update row background
  const row = document.getElementById('row-'+id);
  if(row) row.className = 'check-row'+(S.answers[id]?' '+S.answers[id]:'');
  // Update pill styles
  ['yes','no','na'].forEach(v=>{
    const p = document.getElementById('pill-'+v+'-'+id);
    if(p) p.className = 'pill'+(S.answers[id]===v?' '+v+'-active':'');
  });
  // Show/hide extras (comment + photo)
  updateExtras(id);
  updateSectionProgress(SECTIONS.find(s=>s.items.some(i=>i.id===id))?.id);
  updateProgress();
}

function updateExtras(itemId) {
  const el = document.getElementById('extras-'+itemId);
  if(!el) return;
  const ans = S.answers[itemId];
  if(!ans){el.innerHTML='';return;}
  let html = '';
  if(ans==='no') {
    html += `<input class="row-comment" type="text" value="${esc(S.comments[itemId]||'')}"
      onchange="S.comments['${itemId}']=this.value"
      placeholder="Comment / action required…"/>`;
  }
  // Photo area
  const photos = S.itemPhotos[itemId]||[];
  const thumbs = photos.map(ph=>`
    <div class="photo-thumb">
      <img src="${ph.dataUrl}" alt="evidence"/>
      <button class="remove-btn" onclick="removeItemPhoto('${itemId}','${ph.id}')">×</button>
      <input type="text" value="${esc(ph.caption)}" onchange="captionItemPhoto('${itemId}','${ph.id}',this.value)" placeholder="Caption…"/>
    </div>`).join('');
  html += `<div class="photo-area">
    ${photos.length>0?`<div class="photo-thumbs">${thumbs}</div>`:''}
    <label class="photo-btn">📷 ${photos.length>0?'Add photo ('+photos.length+')':'Attach photo'}
      <input type="file" accept="image/*" capture="environment" multiple style="display:none"
        onchange="addItemPhotos('${itemId}',this.files)"/>
    </label>
  </div>`;
  el.innerHTML = html;
}

// ── Outcome ────────────────────────────────────────────────────────────────────
function setOutcome(val) {
  S.outcome = S.outcome===val ? null : val;
  const configs = {
    satisfactory:{cls:'sat-active',label:'● Satisfactory – No Action Required'},
    minor:{cls:'minor-active',label:'● Satisfactory – Minor Actions Required'},
    unsatisfactory:{cls:'unsat-active',label:'● Unsatisfactory – Immediate Action Required'},
  };
  ['satisfactory','minor','unsatisfactory'].forEach(v=>{
    const btn = document.getElementById('out-'+v);
    if(!btn) return;
    btn.className = 'outcome-btn'+(S.outcome===v?' '+configs[v].cls:'');
    btn.textContent = S.outcome===v ? configs[v].label : configs[v].label.replace('●','○');
  });
}

// ── Photos ─────────────────────────────────────────────────────────────────────
function readFileAsDataUrl(file) {
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
}
async function addItemPhotos(itemId, files) {
  for(const f of Array.from(files)){
    if(!f.type.startsWith('image/')) continue;
    const dataUrl = await readFileAsDataUrl(f);
    if(!S.itemPhotos[itemId]) S.itemPhotos[itemId]=[];
    S.itemPhotos[itemId].push({id:Date.now()+Math.random(),dataUrl,caption:''});
  }
  updateExtras(itemId);
  updateProgress();
  updateSectionPhotoBadge(SECTIONS.find(s=>s.items.some(i=>i.id===itemId))?.id);
}
function removeItemPhoto(itemId, photoId) {
  S.itemPhotos[itemId]=(S.itemPhotos[itemId]||[]).filter(p=>p.id!=photoId);
  updateExtras(itemId);
  updateProgress();
}
function captionItemPhoto(itemId, photoId, val) {
  const p=(S.itemPhotos[itemId]||[]).find(x=>x.id==photoId);
  if(p) p.caption=val;
}
async function addSectionPhotos(sectionId, files) {
  for(const f of Array.from(files)){
    if(!f.type.startsWith('image/')) continue;
    const dataUrl = await readFileAsDataUrl(f);
    if(!S.sectionPhotos[sectionId]) S.sectionPhotos[sectionId]=[];
    S.sectionPhotos[sectionId].push({id:Date.now()+Math.random(),dataUrl,caption:''});
  }
  refreshSectionPhotos(sectionId);
  updateProgress();
}
function removeSectionPhoto(sectionId, photoId) {
  S.sectionPhotos[sectionId]=(S.sectionPhotos[sectionId]||[]).filter(p=>p.id!=photoId);
  refreshSectionPhotos(sectionId);
  updateProgress();
}
function captionSectionPhoto(sectionId, photoId, val) {
  const p=(S.sectionPhotos[sectionId]||[]).find(x=>x.id==photoId);
  if(p) p.caption=val;
}
function refreshSectionPhotos(sectionId) {
  const section = SECTIONS.find(s=>s.id===sectionId);
  const el = document.getElementById('sphotos-'+sectionId);
  if(el && section) el.innerHTML = buildSectionPhotosInner(sectionId, section.title);
  updateSectionPhotoBadge(sectionId);
}
function updateSectionPhotoBadge(sectionId) {
  if(!sectionId) return;
  const sPhotos = (S.sectionPhotos[sectionId]||[]).length;
  const iPhotos = (SECTIONS.find(s=>s.id===sectionId)?.items||[]).reduce((n,i)=>n+(S.itemPhotos[i.id]||[]).length,0);
  const total = sPhotos+iPhotos;
  const badge = document.getElementById('sphoto-badge-'+sectionId);
  if(badge){badge.style.display=total>0?'':'none';badge.textContent='📷 '+total;}
}

// ── Defects ────────────────────────────────────────────────────────────────────
function addDefectRow() {
  const i = S.defects.length;
  S.defects.push({ref:String(i+1),defect:'',action:'',responsible:'',targetDate:''});
  const tbody = document.getElementById('defects-tbody');
  if(tbody){
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="font-weight:700;color:#6B7A8D;width:36px">${i+1}</td>
      <td><input type="text" onchange="S.defects[${i}].defect=this.value" placeholder="Describe defect…"/></td>
      <td><input type="text" onchange="S.defects[${i}].action=this.value" placeholder="Action needed…"/></td>
      <td><input type="text" onchange="S.defects[${i}].responsible=this.value" placeholder="Name…"/></td>
      <td><input type="date" onchange="S.defects[${i}].targetDate=this.value"/></td>`;
    tbody.appendChild(tr);
  }
}

// ── Submit ─────────────────────────────────────────────────────────────────────
async function handleSubmit() {
  if(!S.details.project||!S.details.inspector||!S.details.date){
    alert('Please fill in Project, Inspector and Date before submitting.'); return;
  }
  if(!S.outcome){alert('Please select an Inspection Outcome before submitting.'); return;}
  const btn = document.getElementById('submit-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner">⟳</span> Submitting…';}
  const outcomeLabel = S.outcome==='satisfactory'?'Satisfactory – No Action Required'
    :S.outcome==='minor'?'Satisfactory – Minor Actions Required'
    :'Unsatisfactory – Immediate Action Required';
  const payload = {...S.details,answers:S.answers,comments:S.comments,defects:S.defects,
    outcome:S.outcome,outcomeLabel,
    inspectorSignature:S.inspectorSig,inspectorSignatureDate:S.inspectorSigDate,
    supervisorSignature:S.supervisorSig,supervisorSignatureDate:S.supervisorSigDate,
    itemPhotos:S.itemPhotos,sectionPhotos:S.sectionPhotos,
    submittedAt:new Date().toISOString(),totalPhotos:totalPhotos()};
  try{await fetch(POWER_AUTOMATE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}
  catch(e){console.warn('CORS/network (data still sent):', e);}
  // Show success
  document.getElementById('main-container').style.display='none';
  document.querySelector('.progress-bar-wrap').style.display='none';
  const ss = document.getElementById('success-screen');
  const ol = S.outcome;
  const bg=ol==='satisfactory'?'#DCFCE7':ol==='minor'?'#FEF9C3':'#FEE2E2';
  const col=ol==='satisfactory'?'#15803D':ol==='minor'?'#B45309':'#DC2626';
  document.getElementById('s-project').innerHTML='<strong>'+S.details.project+'</strong> — '+S.details.siteLocation;
  document.getElementById('s-inspector').textContent='Inspector: '+S.details.inspector;
  document.getElementById('s-date').textContent='Date: '+S.details.date;
  const tp=totalPhotos();
  document.getElementById('s-photos').textContent='📷 '+tp+' photo'+(tp!==1?'s':'')+' attached';
  const op=document.getElementById('s-outcome');
  op.style.background=bg; op.style.color=col; op.textContent=outcomeLabel;
  ss.style.display='flex';
}

// ── Reset ──────────────────────────────────────────────────────────────────────
function handleReset() {
  if(!confirm('Reset the entire form? All data will be lost.')) return;
  location.reload();
}
